# Render Blueprint — SME Advisor API + Postgres
# Dashboard: Blueprint → mizn08/SME-Advisor → render.yaml at repo root

services:
  - type: web
    name: sme-advisor-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ML_MODELS_DIR
        value: /app/backend/app/ml_models
      - key: USE_VECTOR_RAG
        value: "false"
      - key: AUTH_REQUIRED
        value: "false"
      - key: DB_WAIT_ATTEMPTS
        value: "90"
      - key: DB_WAIT_INTERVAL
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: sme-advisor-db
          property: internalConnectionString
      - key: OPENAI_API_KEY
        sync: false

  - type: web
    name: sme-advisor-web
    runtime: static
    region: singapore
    plan: free
    buildCommand: chmod +x ./scripts/render_build_web.sh && ./scripts/render_build_web.sh
    staticPublishPath: ./mobile_app/build/web
    envVars:
      - key: API_BASE
        value: https://sme-advisor-api.onrender.com

databases:
  - name: sme-advisor-db
    plan: free
    region: singapore
    databaseName: bnpl_db
    user: bnpl
