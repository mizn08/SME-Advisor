name: SME Advisor CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  docker-render:
    name: Docker build (Render image)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Dockerfile.render
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile.render
          push: false
          load: true
          tags: sme-advisor-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test container
        run: |
          docker run -d --name sme-api -p 8000:8000 \
            -e DATABASE_URL=sqlite:////tmp/ci.db \
            -e USE_VECTOR_RAG=false \
            sme-advisor-api:ci
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/health; then
              echo "Health OK"
              docker logs sme-api | tail -20
              exit 0
            fi
            sleep 3
          done
          docker logs sme-api
          exit 1

  backend-import:
    name: Python import check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install slim deps (same as Render)
        run: pip install -r backend/requirements-render.txt
      - name: Import FastAPI app
        working-directory: backend
        env:
          PYTHONPATH: .
          DATABASE_URL: sqlite:///./ci.db
        run: python -c "from app.main import app; print('OK', app.title)"

  flutter-analyze:
    name: Flutter analyze
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.24.x"
          channel: stable
          cache: true
      - name: pub get & analyze
        working-directory: mobile_app
        run: |
          flutter pub get
          flutter analyze --no-fatal-infos
