# Render Blueprint — SME Advisor
# Dashboard: New + → Blueprint → connect repo → path: deploy/render/render.yaml
# Set root directory to bnpl_advisor_mobile if your repo is the parent folder.

services:
  - type: web
    name: sme-advisor-api
    runtime: docker
    region: singapore
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: ML_MODELS_DIR
        value: /app/backend/app/ml_models
      - key: USE_VECTOR_RAG
        value: "false"
      - key: AUTH_REQUIRED
        value: "false"
      - key: DB_WAIT_ATTEMPTS
        value: "90"
      - key: DB_WAIT_INTERVAL
        value: "3"
      - key: DATABASE_URL
        fromDatabase:
          name: sme-advisor-db
          property: internalConnectionString
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: sme-advisor-db
    plan: free
    region: singapore
    databaseName: bnpl_db
    user: bnpl
