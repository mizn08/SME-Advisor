# BNPL Advisor — backend + PostgreSQL (+ optional pgAdmin)
# Flutter mobile_app is NOT containerised; point it at http://<host>:8000

services:
  db:
    image: postgres:15-alpine
    container_name: bnpl_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-bnpl_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bnpl_db}"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: bnpl_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-bnpl_db}
      ML_MODELS_DIR: /app/backend/app/ml_models
      UPLOAD_DIR: /app/backend/data/uploads
      APP_ENV: ${APP_ENV:-development}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      AWS_REGION: ${AWS_REGION:-ap-southeast-1}
      USE_VECTOR_RAG: ${USE_VECTOR_RAG:-true}
      CHROMA_PERSIST_DIR: /app/backend/data/chroma
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - upload_data:/app/backend/data/uploads

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: bnpl_pgadmin
    profiles: ["tools"]
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@bnpl.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_data:
  upload_data:
  pgadmin_data:
